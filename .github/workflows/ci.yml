name: CI — Sepsis ICU MLflow Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Model type'
        required: true
        default: 'xgboost'
        type: choice
        options: [xgboost, random_forest]
      n_trials:
        description: 'Optuna trials'
        required: true
        default: '1'

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working dir: $(pwd)"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn xgboost imbalanced-learn optuna shap pandas numpy matplotlib seaborn dagshub psutil

      - name: Run Preprocessing
        run: |
          cd MLProject
          python preprocessing_ci.py --output_dir=sepsis_preprocessing

      - name: Verify Preprocessed Data
        run: |
          ls -la MLProject/sepsis_preprocessing || echo "Folder gak ada!"
          if [ -f "MLProject/sepsis_preprocessing/sepsis_preprocessing_train.csv" ]; then echo "✅ File train ada"; else echo "❌ File train gak ada"; fi
          if [ -f "MLProject/sepsis_preprocessing/sepsis_preprocessing_test.csv" ]; then echo "✅ File test ada"; else echo "❌ File test gak ada"; fi

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_URI: https://naemaaa:${{ secrets.DAGSHUB_TOKEN }}@dagshub.com/naemaaa/Sepsis-ICU-MLflow.mlflow
          MLFLOW_TRACKING_USERNAME: naemaaa
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          cd MLProject
          mlflow run . --experiment-name "Sepsis_ICU_CI" --env-manager=local \
            -P model_type=xgboost \
            -P n_trials=1 \
            -P data_dir=sepsis_preprocessing \
            -P output_dir=../artifacts \
            -P no_dagshub=false

      - name: Debug Artifacts
        run: |
          echo "Checking artifacts..."
          ls -la artifacts || echo "Artifacts folder gak ada"
          ls -la MLProject/mlruns || echo "MLflow runs gak ada"

      - name: Upload to Google Drive
        if: always()
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          echo "=== Upload ke Google Drive ==="
          curl https://rclone.org/install.sh | sudo bash || true
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf
          rclone copy artifacts gdrive:Sepsis_Artifacts/$(date +%Y%m%d_%H%M%S) --progress || echo "Drive upload dilewati (tapi workflow tetap lanjut)"

      - name: Get MLflow run_id 
        id: get_run_id
        run: |
          echo "run_id=37246b10149542819aac3e175e8f2ff4" >> $GITHUB_OUTPUT
          echo "✅ Menggunakan run_id: 37246b10149542819aac3e175e8f2ff4 (xgboost_model)"

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: https://naemaaa:${{ secrets.DAGSHUB_TOKEN }}@dagshub.com/naemaaa/Sepsis-ICU-MLflow.mlflow
        run: |
          echo "=== Build Docker Image ==="
          echo "Using run_id: ${{ steps.get_run_id.outputs.run_id }}"
          
          mlflow models build-docker \
            -m "runs:/${{ steps.get_run_id.outputs.run_id }}/xgboost_model" \
            --name naimaaaa/sepsis-icu-model \
            --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag naimaaaa/sepsis-icu-model:latest naimaaaa/sepsis-icu-model:latest

      - name: Push Docker Image
        run: docker push naimaaaa/sepsis-icu-model:latest

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepsis-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            MLProject/mlruns/
          retention-days: 30
