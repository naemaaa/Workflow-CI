name: CI — Sepsis ICU MLflow Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Model type'
        required: true
        default: 'xgboost'
        type: choice
        options: [xgboost, random_forest]
      n_trials:
        description: 'Optuna trials'
        required: true
        default: '1'

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working dir: $(pwd)"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn xgboost imbalanced-learn optuna shap pandas numpy matplotlib seaborn dagshub psutil

      - name: Run Preprocessing
        run: |
          cd MLProject
          python preprocessing_ci.py --output_dir=sepsis_preprocessing

      - name: Verify Preprocessed Data
        run: |
          ls -la MLProject/sepsis_preprocessing || echo "Folder gak ada!"
          if [ -f "MLProject/sepsis_preprocessing/sepsis_preprocessing_train.csv" ]; then echo "✅ File train ada"; else echo "❌ File train gak ada"; fi
          if [ -f "MLProject/sepsis_preprocessing/sepsis_preprocessing_test.csv" ]; then echo "✅ File test ada"; else echo "❌ File test gak ada"; fi

      - name: Set MLflow Tracking URI
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO }}.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          IS_CI: true
        run: |
          mkdir -p artifacts
          cd MLProject
          mlflow run . --experiment-name "Sepsis_ICU_CI" --env-manager=local \
            -P model_type=${{ github.event.inputs.model_type || 'xgboost' }} \
            -P n_trials=1 \
            -P data_dir=sepsis_preprocessing \
            -P output_dir=../artifacts \
            -P no_dagshub=true

      - name: Debug Artifacts
        run: |
          echo "Checking artifacts..."
          ls -la artifacts || echo "Artifacts folder gak ada"
          ls -la MLProject/mlruns || echo "MLflow runs gak ada"

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          if [ -d "mlruns" ]; then
            RUN_ID=$(find mlruns -name "meta.yaml" | head -1 | xargs dirname | xargs basename 2>/dev/null || echo "no-run-id")
            echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
            echo "Latest run ID: $RUN_ID"
          else
            echo "⚠️ No mlruns directory found"
          fi

      # Skip Google Drive for now - not required
      # - name: Upload to Google Drive
      #   env:
      #     RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
      #   run: |
      #     curl https://rclone.org/install.sh | sudo bash || true
      #     mkdir -p ~/.config/rclone
      #     if [ -n "$RCLONE_CONFIG" ]; then
      #       echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf
      #       rclone copy MLProject/mlruns gdrive:Sepsis_ICU_MLflow/$(date +%Y%m%d_%H%M%S) --progress || true
      #     fi

      - name: Build Docker Model
        run: |
          MODEL_PATH=$(find MLProject/mlruns -name "MLmodel" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          if [ -n "$MODEL_PATH" ]; then
            mlflow models build-docker -m "$MODEL_PATH" -n ${{ secrets.DOCKER_USERNAME }}/sepsis-icu-model --enable-mlserver || true
          else
            echo "No model to build Docker"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/sepsis-icu-model:latest ${{ secrets.DOCKER_USERNAME }}/sepsis-icu-model:ci-${{ github.run_number }} || true

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sepsis-icu-model:latest || true
          docker push ${{ secrets.DOCKER_USERNAME }}/sepsis-icu-model:ci-${{ github.run_number }} || true

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepsis-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            MLProject/mlruns/
          retention-days: 30